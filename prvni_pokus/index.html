<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Orientační Běh - QR Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <button id="menuToggle">&#9776;</button>
  <h1>Orientační Běh</h1>
</header>

<nav id="sidebar" class="closed">
  <ul>
    <li data-view="login">Login</li>
    <li data-view="home">Domů</li>
    <li data-view="scanner">Scanner</li>
    <li data-view="history">Historie běhů</li>
    <li data-view="teacher" id="teacherNav">Dashboard Učitele</li>
  </ul>
</nav>

<main id="mainContent">

  <!-- Login -->
  <section id="login" class="view active">
    <h2>Přihlášení</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Jméno" required><br>
      <input type="password" id="password" placeholder="Heslo" required><br>
      <button type="submit">Přihlásit</button>
    </form>
    <div id="loginOutput"></div>
  </section>

  <!-- Home -->
  <section id="home" class="view">
    <h2>Vítejte!</h2>
    <p>Začni běh a skenuj QR kódy na trati.</p>
    <canvas id="mapCanvas" width="400" height="400"></canvas>
    <div id="locationOutput">Klikni na mapu pro nastavení polohy</div>
  </section>

  <!-- Scanner -->
  <section id="scanner" class="view">
    <h2>Scanner</h2>
    <video id="video" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="scanOutput">Zatím nic naskenováno</div>
    <button id="startScan">Start Scan</button>
  </section>

  <!-- History -->
  <section id="history" class="view">
    <h2>Historie běhů</h2>
    <ul id="historyList"></ul>
  </section>

  <!-- Teacher Dashboard -->
  <section id="teacher" class="view">
    <h2>Dashboard Učitele</h2>
    <ul id="teacherList"></ul>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script src="app.js"></script>
</body>
</html>
