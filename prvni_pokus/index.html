<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orientační běh - Dashboard</title>

<!-- Font Awesome pro ikony -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />

<link rel="stylesheet" href="style.css">
<script type="module" src="app.js"></script>
</head>
<body>

<header>
  <h1>Orientační běh</h1>
  <button id="logoutBtn" onclick="odhlaseni()" style="display:none;"><i class="fas fa-right-from-bracket"></i> Odhlásit se</button>
</header>

<main>
  <!-- Přihlášení -->
  <div id="loginDiv">
    <label for="nick">Nick:</label>
    <input type="text" id="nick" placeholder="Zadej svůj nick">
    <button onclick="prihlaseni()"><i class="fas fa-sign-in-alt"></i> Přihlásit / Registrovat</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none;">
    <h2>Vítej, <span id="userNick"></span>!</h2>

    <div id="stats">
      <p>Celkový počet map: <span id="mapCount">0</span></p>
    </div>

    <section id="addMap">
      <input type="text" id="mapaNazev" placeholder="Název mapy">
      <button onclick="ulozMapu()"><i class="fas fa-plus"></i> Přidat mapu</button>
    </section>

    <section id="mapySection">
      <div id="mapyList" class="mapy-grid"></div>
    </section>
  </div>
</main>

</body>
</html>
